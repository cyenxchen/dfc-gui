/**
 * Minimal subset of IM2 DataType definitions required for decoding iothub
 * prop_data payloads (DataFrame/DataRecordSet) and thing_event payloads
 * (EventRecordList/EventRecord).
 *
 * Source of truth/reference: DFC project `DataType.proto` (protobuf v3).
 */
syntax = "proto3";

import "google/protobuf/any.proto";
import "google/protobuf/struct.proto";

/* 任意类型，用于各种类型不能事先确定的场景 */
message AnyValue {
  oneof v {
    double doubleV = 1;
    float floatV = 2;
    int32 int32V = 3;
    uint32 uint32V = 4;
    uint64 uint64V = 5;
    sint32 sint32V = 6;
    sint64 sint64V = 7;
    fixed32 fixed32V = 8;
    fixed64 fixed64V = 9;
    sfixed32 sfixed32V = 10;
    sfixed64 sfixed64V = 11;
    bool boolV = 12;
    string stringV = 13;
    bytes bytesV = 14;

    /* 消息类（复杂结构体）数据使用下面这个 */
    google.protobuf.Any anyV = 15;

    /* 空值 */
    google.protobuf.NullValue nullV = 16;

    /* 自定义的复合结构，适用于protobuf没有相应定义的场景 */
    string jsonV = 17;
    bytes msgPackV = 18;
  }
}

/* 时间纳秒类型 */
message HiClockTime {
  uint32 t = 1;
  uint32 nano = 2;
  int32 zoneInfo = 3;
}

/* 时间类型（unix seconds） */
message ClockTime {
  uint32 t = 1;
  int32 zoneInfo = 2;
}

/* 由IMR序列化产生的唯一字符串，类似于URL。 */
message IMRRef {
  string path = 1;
}

/* 枚举数值，可能是字符串或者整型数字 */
message EnumValue {
  oneof v {
    uint64 uint64V = 1;
    bool boolV = 2;
    string stringV = 3;
  }
}

/* 事件记录定义 */
message EventRecord {
  string evtUUID = 1;
  string type = 3;
  repeated string tags = 4;
  string src = 5;
  string imGlobalUUID = 6;
  string imr = 7;
  HiClockTime happenedTime = 8;
  ClockTime recordTime = 9;
  uint32 level = 10;
  repeated EnumValue code = 11;
  string dictName = 12;
  string bcrUUID = 13;
  map<string, AnyValue> context = 14;
}

/** 服务请求记录定义
 * 不会单独传输,而是作为 EventRecord.context 中 key 为 "svrReq" 的项传输。
 */
message SvrReqRecord {
  string reqSerialUUID = 1;       /* 请求序列号 */
  ClockTime reqDateTime = 2;      /* 请求下发时间 */
  uint32 timeOut = 3;             /* 超时时间(毫秒),默认 5000 */
  string requester = 4;           /* 服务请求者 */
  string imr = 5;                 /* 服务的 IMR */
  map<string, AnyValue> args = 6; /* 服务请求参数 */
  bool isTestRequest = 7;         /* 是否测试请求 */
}

/* 服务响应记录定义
 * 不会单独传输,而是作为 EventRecord.context 中 key 为 "svrResp" 的项传输。
 */
message SvrRespRecord {
  string reqSerialUUID = 1;       /* 请求序列号 */
  uint32 respCode = 2;            /* 响应码,参考 OPC UA StatusCode */
  ClockTime respDateTime = 3;     /* 响应发出时间 */
  string requester = 4;           /* 服务请求者 */
  string imr = 5;                 /* 服务的 IMR */
  map<string, AnyValue> args = 6; /* 服务响应参数 */
  string responser = 7;           /* 服务响应者 */
}
