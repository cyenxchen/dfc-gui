name: Release

run-name: Release ${{ github.ref_name }}

on:
  push:
    tags:
      - '**'

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build-macos-arm64:
    name: Build macOS arm64
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust target
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add aarch64-apple-darwin

      - name: Install protoc
        run: |
          brew install protobuf
          protoc --version

      - name: Build release binary
        run: cargo build --release --target aarch64-apple-darwin

      - name: Package release asset
        id: package
        shell: bash
        run: |
          set -euo pipefail
          safe_tag="${GITHUB_REF_NAME//\//-}"
          app="dist/DFC-GUI.app"
          contents="dist/dmg"
          temp_dmg="dist/DFC-GUI-temp.dmg"
          asset="dfc-gui-${safe_tag}-macos-arm64.dmg"
          mkdir -p "$app/Contents/MacOS" "$app/Contents/Resources" "$contents"
          cp "target/aarch64-apple-darwin/release/dfc-gui" "$app/Contents/MacOS/dfc-gui"
          chmod +x "$app/Contents/MacOS/dfc-gui"
          cat > "$app/Contents/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleDevelopmentRegion</key>
            <string>en</string>
            <key>CFBundleExecutable</key>
            <string>dfc-gui</string>
            <key>CFBundleIdentifier</key>
            <string>com.goldwind.dfc-gui</string>
            <key>CFBundleInfoDictionaryVersion</key>
            <string>6.0</string>
            <key>CFBundleName</key>
            <string>DFC-GUI</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>${safe_tag#v}</string>
            <key>CFBundleVersion</key>
            <string>${safe_tag#v}</string>
            <key>LSMinimumSystemVersion</key>
            <string>12.0</string>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          PLIST
          cp -R "$app" "$contents/DFC-GUI.app"
          ln -s /Applications "$contents/Applications"

          hdiutil create -volname "DFC-GUI" -srcfolder "$contents" -ov -format UDRW "$temp_dmg"

          device=""
          mount_point=""
          volume_name=""
          cleanup() {
            if [ -n "$device" ]; then
              hdiutil detach "$device" >/dev/null 2>&1 || true
            fi
          }
          trap cleanup EXIT

          attach_output="$(hdiutil attach -readwrite -noverify -noautoopen "$temp_dmg")"
          device="$(printf '%s\n' "$attach_output" | awk -F '\t' '/\/Volumes\// { gsub(/^[[:space:]]+|[[:space:]]+$/, "", $1); print $1; exit }')"
          mount_point="$(printf '%s\n' "$attach_output" | awk -F '\t' '/\/Volumes\// { print $NF; exit }')"
          volume_name="$(basename "$mount_point")"
          sleep 2

          osascript - "$volume_name" <<'APPLESCRIPT'
          on run argv
            set volume_name to item 1 of argv
          tell application "Finder"
            tell disk volume_name
              open
              set current view of container window to icon view
              set toolbar visible of container window to false
              set statusbar visible of container window to false
              set bounds of container window to {100, 100, 780, 460}
              set view_options to the icon view options of container window
              set arrangement of view_options to not arranged
              set icon size of view_options to 128
              set text size of view_options to 14
              set position of item "DFC-GUI.app" of container window to {180, 170}
              set position of item "Applications" of container window to {500, 170}
              close
              open
              update without registering applications
            end tell
          end tell
          delay 2
          end run
          APPLESCRIPT

          sync
          hdiutil detach "$device"
          device=""

          hdiutil convert "$temp_dmg" -ov -format UDZO -o "$asset"
          rm -f "$temp_dmg"
          echo "asset=$asset" >> "$GITHUB_OUTPUT"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-arm64
          path: ${{ steps.package.outputs.asset }}
          if-no-files-found: error

  build-windows-x86:
    name: Build Windows x86
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust target
        shell: pwsh
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add i686-pc-windows-msvc

      - name: Install protoc
        shell: pwsh
        run: |
          choco install protoc -y
          protoc --version

      - name: Build release binary
        shell: pwsh
        run: cargo build --release --target i686-pc-windows-msvc

      - name: Package release asset
        id: package
        shell: pwsh
        run: |
          $safeTag = $env:GITHUB_REF_NAME -replace '/', '-'
          $asset = "dfc-gui-$safeTag-windows-x86.zip"
          $dir = "dist"
          New-Item -ItemType Directory -Path $dir -Force | Out-Null
          Copy-Item "target/i686-pc-windows-msvc/release/dfc-gui.exe" "$dir/dfc-gui.exe" -Force
          if (Test-Path $asset) {
            Remove-Item $asset -Force
          }
          Compress-Archive -Path "$dir/dfc-gui.exe" -DestinationPath $asset
          Add-Content -Path $env:GITHUB_OUTPUT -Value "asset=$asset"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-windows-x86
          path: ${{ steps.package.outputs.asset }}
          if-no-files-found: error

  publish-release:
    name: Publish release
    runs-on: ubuntu-22.04
    needs:
      - build-macos-arm64
      - build-windows-x86
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: release-macos-arm64
          path: release-assets/macos

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: release-windows-x86
          path: release-assets/windows

      - name: Prepare release notes
        id: notes
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          notes_file="$(mktemp)"
          previous_tag="$(git describe --tags --abbrev=0 "${tag}^{}^" 2>/dev/null || true)"

          {
            echo "## Changes"
            echo

            if [ -n "$previous_tag" ]; then
              echo "Changes since \`$previous_tag\`:"
              echo
              git log "${previous_tag}..${tag}" --no-merges --pretty=format:'- `%h` %s'
            else
              echo "Changes included in \`$tag\`:"
              echo
              git log "${tag}^{}" --no-merges --pretty=format:'- `%h` %s'
            fi
          } > "$notes_file"

          if ! grep -q '^-' "$notes_file"; then
            {
              echo
              echo "- No non-merge commits found for this release."
            } >> "$notes_file"
          fi

          echo "notes_file=$notes_file" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          mapfile -t files < <(find release-assets -maxdepth 2 -type f | sort)
          notes_file="${{ steps.notes.outputs.notes_file }}"

          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release assets found"
            exit 1
          fi

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" --title "$tag" --notes-file "$notes_file"
            gh release upload "$tag" "${files[@]}" --clobber
          else
            gh release create "$tag" "${files[@]}" --title "$tag" --verify-tag --notes-file "$notes_file"
          fi

      - name: Prune old releases
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          keep_limit=2

          mapfile -t release_tags < <(
            gh api "repos/${GH_REPO}/releases?per_page=100" --paginate \
              --jq '.[] | select(.draft == false) | [.tag_name, (.published_at // .created_at)] | @tsv' |
              sort -r -k2,2 |
              cut -f1
          )

          kept=0

          for release_tag in "${release_tags[@]}"; do
            if [ "$kept" -lt "$keep_limit" ]; then
              kept=$((kept + 1))
              continue
            fi

            echo "Deleting old release: $release_tag"
            gh release delete "$release_tag" --yes
          done
